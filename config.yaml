# IC Segmentation Configuration
#
# This file contains machine-specific configurations.
# The system automatically detects which machine you're on and loads the appropriate config.
# All eval_totalseg parameters can be overridden via command-line arguments.


nora:

  paths:
    DATA_DIR: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data"
    RESULTS_DIR: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/results"
    totalseg_dataset: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data/TotalSeg"
    medverse_checkpoint: "/nfs/norasys/notebooks/camaret/repos/Medverse/Medverse.ckpt"
    neuroverse_checkpoint: "/software/notebooks/camaret/repos/Neuroverse3D/checkpoint/neuroverse3D.ckpt"

  train_totalseg:
    # Dataset
    dataset_path: null  # Uses paths.totalseg_dataset if not specified
    train_label_ids:
      - heart
    val_label_ids:
      - heart
    image_size: [128, 128, 128]
    spacing: [1.5, 1.5, 1.5]

    # Dataloader
    train_batch_size: 2
    val_batch_size: 1
    num_workers: 4
    max_ds_len: null  # null = use full dataset

    # Model (SegFormer3D)
    model_parameters:
      in_channels: 1
      sr_ratios: [4, 2, 1, 1]
      embed_dims: [32, 64, 160, 256]
      patch_kernel_size: [7, 3, 3, 3]
      patch_stride: [4, 2, 2, 2]
      patch_padding: [3, 1, 1, 1]
      mlp_ratios: [4, 4, 4, 4]
      num_heads: [1, 2, 5, 8]
      depths: [2, 2, 2, 2]
      num_classes: 1  # Binary segmentation per label
      decoder_dropout: 0.0
      decoder_head_embedding_dim: 256

    # Loss
    loss_fn:
      loss_type: "dice"
      loss_args: null

    # Optimizer
    optimizer:
      optimizer_type: "adamw"
      optimizer_args:
        lr: 0.0001
        weight_decay: 0.01

    # Schedulers
    warmup_scheduler:
      enabled: true
      warmup_epochs: 10
    train_scheduler:
      scheduler_type: "cosine_annealing_wr"
      scheduler_args:
        t_0_epochs: 100
        t_mult: 1
        min_lr: 0.000001

    # Training
    training_parameters:
      seed: 42
      num_epochs: 200
      print_every: 50
      grad_accumulate_steps: 1
      checkpoint_save_dir: null # null = default directory

    # Logging
    wandb_project: "segformer3d_totalseg"
    #wandb_entity: null
    #wandb_group: "totalseg"
    #wandb_name: "segformer3d_train"

    # NMSW (No More Sliding Window) patch sampling
    # Replaces sliding window with differentiable top-k patch selection
    nmsw:
      enabled: true  # Set to true to enable NMSW sampling

      # Global branch (coarse prediction)
      down_size_rate: [2, 2, 2]  # Downsampling factor for global branch
      global_model_scale: 0.5    # Scale factor for global model channels (smaller = faster)

      # Patch sampling
      # patch_size should be SMALLER than image_size to benefit from selective sampling
      # With 128^3 image and 64^3 patches at 50% overlap: ~8 patches total
      # Selecting top-4 reduces compute by ~50%
      patch_size: [8, 8, 8]    # Patch size for local branch (smaller than image_size!)
      overlap: 0.5                 # Patch overlap (0.5 = 50%)
      num_train_patches: 50          # Top-k patches during training
      num_train_random_patches: 50   # Random patches for exploration
      num_inference_patches: 50      # Top-k patches during inference

      # Gumbel-softmax temperature (controls selection hardness)
      starting_tau: 0.6666          # Initial temperature (softer selection)
      final_tau: 0.6666             # Final temperature (can decay to harder)
      tau_decay_epochs: 100         # Epochs over which to decay tau

      # Loss weighting
      global_loss_weight: 1.0       # Weight for global (coarse) prediction loss
      local_loss_weight: 1.0        # Weight for local (patch) prediction loss
      agg_loss_weight: 1.0          # Weight for aggregated prediction loss
      entropy_multiplier: 0.00001   # Encourage diverse patch sampling

      # Aggregation
      add_aggregation_module: false  # Use learnable aggregation (combines local + global)

      # Token-based local branch (alternative to SegFormer3D)
      # Set use_token_branch: true to use transformer-based patch processing
      use_token_branch: true        # Use token-based transformer instead of SegFormer3D
      transformer_embed_dim: 256     # Embedding dimension for patch tokens
      transformer_num_heads: 8       # Number of attention heads
      transformer_num_layers: 6      # Number of transformer encoder layers
      transformer_mlp_ratio: 4.0     # MLP hidden dim = embed_dim * mlp_ratio
      transformer_dropout: 0.1       # Dropout rate in transformer

  eval_totalseg:
    dataset_path: null  # Uses paths.totalseg_dataset if not specified
    model_path: null     # Uses paths.medverse_checkpoint if not specified
    
    # Model type selection
    # - "medverse": Original Medverse model (default)
    # - "nmsw": NMSW with SegFormer3D local branch
    # - "nmsw_token": NMSW with Token-based transformer local branch
    model_type: "medverse"
    nmsw_checkpoint: null  # Path to NMSW checkpoint (for nmsw/nmsw_token types)

    # Label selection
    # label_ids_split: Can be:
    #   - "train", "val", or "all" (predefined splits)
    #   - List of specific label IDs
    # label_ids_split: "val"
    label_ids_split:
      - heart
      - spinal_cord
      - autochthon_left
      - autochthon_right
      - aorta
      - esophagus
      - lung_upper_lobe_left
      - lung_upper_lobe_right
      - costal_cartilages
      - liver
      - colon
      - stomach
      - femur_left
      - femur_right
    # Model parameters
    context_size: 3
    spacing: [1.5, 1.5, 1.5]
    sw_roi_size: [128, 128, 128]
    sw_overlap: 0.25
    # sampling_method: Context sampling strategy
    #   - "original": Medverse's default (samples from same spatial location as target)
    #   - "foreground": Custom method (samples from locations with foreground voxels)
    sampling_method: "foreground"

    # Dataloader parameters
    batch_size: 1 # if > 1, images must have same size
    image_size: null  # null = original size
    num_workers: 4
    split: "val"  # Dataset split to use ("train", "val", "test")
    shuffle: false
    random_context: false
    max_ds_len: null  # null = use full dataset, or integer to limit number of samples

    # Logging and inspection
    wandb_project: "ic_segmentation"  # W&B project name
    use_wandb: true
    save_imgs_masks: false
    enable_inspection: false
    max_inspect_cases: 1

