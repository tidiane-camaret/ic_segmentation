# IC Segmentation Configuration
#
# This file contains machine-specific configurations.
# The system automatically detects which machine you're on and loads the appropriate config.
# All eval_totalseg parameters can be overridden via command-line arguments.

paths: 
  DATA_DIR: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data"
  RESULTS_DIR: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/results"
  totalseg: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data/TotalSeg" 
  medsegbench: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data/MedSegBench"
  totalseg2d: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data/TotalSeg2D"
  totalseg_stats: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/data/TotalSeg/totalseg_stats.pkl"

  ckpts:
      save_dir: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/results/checkpoints"
      medverse: "/nfs/norasys/notebooks/camaret/repos/Medverse/Medverse.ckpt"
      dino_vit: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/models--facebook--dinov3-vitl16-pretrain-lvd1689m/snapshots/ea8dc2863c51be0a264bab82070e3e8836b02d51"
      dino_convnext: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/models--facebook--dinov3-convnext-large-pretrain-lvd1689m/snapshots/e959efa74c867491dcfe3ec3e4f97382e39025b3"

train:
  dataset: totalseg2d #"medsegbench_abdomenus"
  download: false
  load_dinov3_features: true
  context_size: 1
  method: "patch_icl"  # Options: "segformer3d", "global_local", "patch_icl"
  train_label_ids:  "train" #["liver"] [1,2,3,4,5] # 0 should be excluded (background)
  val_label_ids: "val" #["liver"] # # [6,7,8]

  preprocessing:
    image_size: [512, 512, 512]
    spacing: [1.5, 1.5, 1.5]
    crop_to_bbox: false
    bbox_padding: 20

  # Dataloader
  train_batch_size: 50 #24
  val_batch_size: 64 #24
  num_workers: 8
  max_ds_len: 1000  # null = use full dataset

  # Optimizer
  optimizer:
    optimizer_type: "adamw"
    optimizer_args:
      lr: 0.0001
      weight_decay: 0.01

  # Schedulers
  warmup_scheduler:
    enabled: true
    warmup_epochs: 10
  train_scheduler:
    scheduler_type: "cosine_annealing_wr"
    scheduler_args:
      t_0_epochs: 100
      t_mult: 1
      min_lr: 0.000001

  # Training
  training_parameters:
    seed: 42
    num_epochs: 200
    print_every: 50
    grad_accumulate_steps: 1

  logging:
    use_wandb: true
    wandb_project: "patch_icl_train"
    save_imgs_masks: true



# model parameters
model_params:
  patch_icl:
    # Multi-resolution levels (coarse to fine)
    levels:
      - resolution: 32
        patch_size: 16
        num_patches: 16
        sampling_temperature: 0.3
      #- resolution: 128
      #  patch_size: 16
      #  num_patches: 32
      #  sampling_temperature: 0.3
      #- resolution: 224
      #  patch_size: 16
      #  num_patches: 64
      #  sampling_temperature: 0.3

    # Oracle mode per level: true = use GT mask for sampling, false = use prev prediction
    # Length must match number of levels. First level has no prev_pred so oracle=false means uniform sampling.
    # Separate settings for train vs validation to avoid train/test distribution mismatch.
    oracle_levels_train: [true]   # Training: use GT mask for focused sampling
    oracle_levels_valid: [true]  # Validation: uniform sampling (realistic test scenario)
    # oracle_levels_train: [true, false, false]  # For 3 levels: oracle on first only

    # Patch sampling configuration
    sampler:
      type: "gumbel"  # Options: "weighted" (default), "uniform", "topk", "gumbel"
      exploration_noise: 0.5  # Noise magnitude during training (0 = deterministic)
      stride_divisor: 4  # Stride = patch_size // stride_divisor
      # Gumbel-Softmax options (only used when type: "gumbel")
      gumbel_tau: 1.0       # Gumbel temperature (higher = softer, anneal during training)
      gumbel_tau_min: 0.1   # Minimum tau for annealing
      gumbel_hard: true     # Use straight-through estimator (hard forward, soft backward)
      # Patch augmentation (applied after sampling, during training only)
      augmentation:
        enabled: false
        rotation: "none"         # "none", "90" (fast), "continuous" (slow, uses grid_sample)
        rotation_range: 0.5    # Max rotation in radians (for continuous mode)
        flip_horizontal: true
        flip_vertical: true
        # scale_range: [0.9, 1.1]  # Optional random scaling

    # Aggregator configuration (inspired by NMSW - No More Sliding Window)
    aggregator:
      type: "gaussian"  # Options: "average", "gaussian", "confidence", "learned", "learned_combine"
      combine_mode: "coverage"  # How to combine with prev level:
                                # "average" - weighted blend everywhere
                                # "replace" - ignore prev prediction
                                # "coverage" - use prev only where no patch coverage (NMSW style)
      combine_weight: 0.5      # Weight for current prediction when combine_mode="average"
      fill_uncovered: "zero"   # How to fill uncovered regions (when no prev_pred): "zero" (prob~0) or "prev" (prob~0.5)
      min_coverage: 0.000001   # Threshold for considering a pixel "covered"
      # Gaussian aggregator options (only used when type: "gaussian")
      sigma_ratio: 0.125       # Gaussian sigma as ratio of patch size (0.125 = NMSW default)
      # Confidence aggregator options (only used when type: "confidence")
      confidence_temperature: 2.0  # Higher = more uniform, lower = sharper
      # Learned aggregator options (only used when type: "learned" or "learned_combine")
      hidden_dim: 32           # Hidden dimension for weight predictor CNN

    # Backbone configuration
    backbone:
      type: "precomputed"  # Options: "dino", "dino_light"
      share_backbone: false  # Share weights across levels
      image_size: 224
      embed_dim: 1024  # DINOv3 ViT-L features are 1024-dim
      num_heads: 8
      num_layers: 4
      pretrained_path: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/models--facebook--dinov3-vitl16-pretrain-lvd1689m/snapshots/ea8dc2863c51be0a264bab82070e3e8836b02d51"
      # Mask conditioning: add context mask embeddings to context features before transformer
      use_mask_conditioning: true
    
    masking :
      target_mask_ratio: 1
      context_mask_ratio: 0

    # Loss configuration
    loss:
      # Loss functions (feature losses always use MSE)
      patch_loss:
        type: "binarycrossentropy"           # Loss for patch predictions
        args: null
      aggreg_loss:
        type: "dice"           # Loss for aggregated predictions
        args: null

      # Loss weights (default applies to all levels; can override per-level)
      weights:
        default:
          target_patch: 0.5       # Loss on target patches
          target_aggreg: 0.5      # Loss on aggregated target prediction
          context_patch: 0.5      # Loss on context patches
          context_aggreg: 0.5     # Loss on aggregated context prediction
          feature_patch: 1.0      # Target feature MSE on patches
          feature_aggreg: 1.0     # Target feature MSE on aggregated features
          context_feature_patch: 1.0    # Context feature MSE on patches
          context_feature_aggreg: 1.0   # Context feature MSE on aggregated features
        # Per-level overrides (optional, indexed by level)
        # levels:
        #   - target_patch: 1.0   # Level 0
        #     target_aggreg: 0.5
        #   - target_patch: 1.0   # Level 1
        #     target_aggreg: 1.0

  global_local:
    global:

      backbone: "ground_truth"
      down_size_rate: 16
      base_channels: 16
      image_size: 512  # Must match train.preprocessing.image_size[0]

      # Patch sampling
      patch_size: 16    # Patch size for local branch (smaller than image_size!)
      overlap: 0.5                 # Patch overlap (0.5 = 50%)
      num_train_patches: 50          # Top-k patches during training
      #num_train_random_patches: 50   # Random patches for exploration
      #num_inference_patches: 50      # Top-k patches during inference
  
      # Gumbel-softmax temperature (controls selection hardness)
      starting_tau: 0.6666          # Initial temperature (softer selection)
      final_tau: 0.6666             # Final temperature (can decay to harder)
      tau_decay_epochs: 100         # Epochs over which to decay tau

      # Loss
      loss:
        objective: "gt_mask"  # could later recontstruct input image features
        weight: 1.0       # Weight for global (coarse) prediction

    local:

      backbone: "patch_transformer"

      loss:
        objective: "gt_mask"
        weight: 1.0        # Weight for local (patch) prediction

    aggregation:

      learnable: false  # Use learnable aggregation (combines local + global)

      loss:
        objective: "gt_mask"
        weight: 1.0        # Weight for aggregated prediction loss

  segformer3d:
    in_channels: 1
    sr_ratios: [4, 2, 1, 1]
    embed_dims: [32, 64, 160, 256]
    patch_kernel_size: [7, 3, 3, 3]
    patch_stride: [4, 2, 2, 2]
    patch_padding: [3, 1, 1, 1]
    mlp_ratios: [4, 4, 4, 4]
    num_heads: [1, 2, 5, 8]
    depths: [2, 2, 2, 2]
    num_classes: 1  # Binary segmentation per label
    decoder_dropout: 0.0
    decoder_head_embedding_dim: 256

  patch_transformer:
    embed_dim: 512                  # Token embedding dimension (increased)
    num_heads: 8                    # Attention heads
    num_layers: 12                  # Transformer depth (increased)
    mlp_ratio: 4.0                  # MLP hidden dim = embed_dim * mlp_ratio
    dropout: 0.1
    pos_encoding: "learnable"  # Positional encoding: "sinusoidal", "learnable", "relative"

  medverse:
    context_size: 3
    spacing: [1.5, 1.5, 1.5]
    sw_roi_size: [128, 128, 128]
    sw_overlap: 0.25
    # sampling_method: Context sampling strategy
    #   - "original": Medverse's default (samples from same spatial location as target)
    #   - "foreground": Custom method (samples from locations with foreground voxels)
    sampling_method: "foreground"  # Context sampling strategy

eval:
  dataset: "totalseg"
  method: "medverse"
  val_label_ids: # -"train", "val", "all" (predefined splits) or list
    - heart
    - spinal_cord
    - autochthon_left
    - autochthon_right
    - aorta
    - esophagus
    - lung_upper_lobe_left
    - lung_upper_lobe_right
    - costal_cartilages
    - liver
    - colon
    - stomach
    - femur_left
    - femur_right
    
  # Dataloader parameters
  batch_size: 1 # if > 1, images must have same size
  image_size: null  # null = original size
  num_workers: 4
  split: "val"  # Dataset split to use ("train", "val", "test")
  shuffle: false
  random_context: false
  max_ds_len: null  # null = use full dataset, or integer to limit number of samples

  # Logging and inspection
  logging:
    use_wandb: true
    save_imgs_masks: false
    enable_inspection: false
    max_inspect_cases: 1

  