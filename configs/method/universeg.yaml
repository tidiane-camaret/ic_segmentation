# @package _global_
# UniverSeg baseline method configuration

method: "universeg"
training:
  mixed_precision: "no"
model:
  universeg:
    pretrained: true
    input_size: "${preprocessing.image_size}"  # References config.yaml
    freeze: false    # Set to true for evaluation only

# Loss configuration for training
loss:
  aggreg_loss:
    type: "softdice"
    args: null
