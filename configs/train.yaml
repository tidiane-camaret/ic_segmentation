# Override any parameter via CLI: python scripts/train.py experiment=patch_icl_v1
# Multi-run sweep: python scripts/train.py -m context_size=1,2,3

defaults:
  - _self_
  - experiment: null
  - cluster: nfs


# Logging
logging:
  use_wandb: true
  wandb_project: "patch_icl"
  wandb_project_eval: "patch_icl_eval"
  save_imgs_masks: true
  save_every_n_epochs: 1  # Save train images every N epochs
  
# Dataset: "totalseg2d" or "medsegbench"
dataset: totalseg
download: false
context_size: 1
random_coloring_nb: 0

train_label_ids: "train"
val_label_ids: "val"

# MedSegBench-specific settings (used when dataset=medsegbench)
medsegbench:
  datasets: null  # List of dataset names to load, null for all
  max_samples_per_dataset: null  # Limit per dataset (for debugging)

# Preprocessing
preprocessing:
  image_size: [512, 512, 512]
  spacing: [1.5, 1.5, 1.5]
  crop_to_bbox: false
  bbox_padding: 20

max_files_3d_to_2d: null  # Limit number of cases/files to process (for debugging)
class_balanced: true  # Uniform label sampling (each label equally likely per step)
# Dataloader
train_batch_size: 50
val_batch_size: 64
max_ds_len:  # Can be null, int, or dict with train/val keys
  train: null
  val: null

# Optimizer
optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0003
    weight_decay: 0.01

# Schedulers
warmup_scheduler:
  enabled: true
  warmup_epochs: 15

train_scheduler:
  scheduler_type: "cosine_annealing"
  scheduler_args:
    min_lr: 0.000001

# Training
training:
  seed: 42
  num_epochs: 150
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 8
  log_every: 10

method: "patch_icl"
checkpoint: null  # Path to model checkpoint to load weights from

# Feature extraction mode: "precomputed" or "on_the_fly"
feature_mode: "precomputed"
feature_extractor_type: "meddino"
feature_extraction_resolution: 256
meddino_layer_idx: 11

# Model
model:
  patch_icl:
    levels:
      - resolution: 32
        patch_size: 16
        num_patches: 16
        sampling_temperature: 0.1

    oracle_levels_train: [true]
    oracle_levels_valid: [true]

    sampler:
      type: "continuous"  # Options: "continuous", "sliding_window"
      sliding_window_stride: null
      augmentation:
        enabled: false
        rotation: "90"
        rotation_range: 0.5
        flip_horizontal: true
        flip_vertical: true

    aggregator:
      type: "gaussian"  # Options: "average", "gaussian"
      combine_mode: "coverage"
      combine_weight: 0.5
      fill_uncovered: "zero"
      min_coverage: 0.000001
      sigma_ratio: 0.125

    backbone:
      image_size: 224
      embed_dim: 1024
      embed_proj_dim: 128
      feature_grid_size: 16
      patch_feature_grid_size: 16
      num_heads: 8
      num_layers: 1
      num_registers: 4
      dropout: 0.0
      target_self_attention: false

    loss:
      patch_loss:
        type: "binarycrossentropy"
        args: null
      aggreg_loss:
        type: "dice"
        args: null
      weights:
        default:
          target_patch: 0.5
          target_aggreg: 0.5
          context_patch: 0.5
          context_aggreg: 0.5

# Hydra settings
hydra:
  run:
    dir: ${paths.RESULTS_DIR}/runs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${paths.RESULTS_DIR}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
