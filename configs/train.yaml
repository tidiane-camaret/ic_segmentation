# Training configuration for Hydra
# Override any parameter via CLI: python scripts/train.py dataset=medsegbench_livertumor
# Multi-run sweep: python scripts/train.py -m context_size=1,2,3

defaults:
  - paths: nfs  # Options: nfs, local, dlclarge
  - _self_
  - experiment: null  # Optional: override with experiment=attention (loaded last to override base)

# Dataset
dataset: totalseg2d
download: false
load_dinov3_features: true
context_size: 1
random_coloring_nb: 0  # 0: single-label binary masks, >0: multi-label RGB masks with N random labels
method: "patch_icl"  # Options: "segformer3d", "global_local", "patch_icl"
train_label_ids: "train"
val_label_ids: "val"

# Preprocessing
preprocessing:
  image_size: [512, 512, 512]
  spacing: [1.5, 1.5, 1.5]
  crop_to_bbox: false
  bbox_padding: 20

# Dataloader
train_batch_size: 50
val_batch_size: 64
max_ds_len: null # Use full dataset

# Optimizer
optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0001
    weight_decay: 0.01

# Schedulers
warmup_scheduler:
  enabled: true
  warmup_epochs: 10
train_scheduler:
  scheduler_type: "cosine_annealing_wr"
  scheduler_args:
    t_0_epochs: 100
    t_mult: 1
    min_lr: 0.000001

# Training (renamed from training_parameters for cleaner access)
training:
  seed: 42
  num_epochs: 200
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 8

# Logging
logging:
  use_wandb: true
  wandb_project: "patch_icl_train"
  save_imgs_masks: true

# Model parameters
model:
  patch_icl:
    levels:
      - resolution: 32
        patch_size: 16
        num_patches: 16
        sampling_temperature: 0.3

    oracle_levels_train: [true]
    oracle_levels_valid: [true]

    sampler:
      type: "gumbel"  # Options: "weighted", "uniform", "topk", "gumbel", "sliding_window"
      exploration_noise: 0.5
      stride_divisor: 4
      # Gumbel-Softmax options
      gumbel_tau: 1.0
      gumbel_tau_min: 0.1
      gumbel_hard: true
      # Sliding window options (only used when type: "sliding_window")
      sliding_window_stride: null  # If null, uses patch_size (no overlap)
      augmentation:
        enabled: false
        rotation: "none"
        rotation_range: 0.5
        flip_horizontal: true
        flip_vertical: true

    aggregator:
      type: "gaussian"
      combine_mode: "coverage"
      combine_weight: 0.5
      fill_uncovered: "zero"
      min_coverage: 0.000001
      sigma_ratio: 0.125
      confidence_temperature: 2.0
      hidden_dim: 32

    backbone:
      type: "precomputed"
      share_backbone: false
      image_size: 224
      embed_dim: 1024
      num_heads: 8
      num_layers: 4
      pretrained_path: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/models--facebook--dinov3-vitl16-pretrain-lvd1689m/snapshots/ea8dc2863c51be0a264bab82070e3e8836b02d51"
      use_mask_conditioning: true

    masking:
      target_mask_ratio: 1
      context_mask_ratio: 0

    loss:
      # Loss types: binarycrossentropy, dice, diceCE, smoothl1, mse, l1
      # For RGB masks (random_coloring_nb > 0), use regression losses: smoothl1, mse, l1
      # smoothl1/mse/l1 args: {beta: 1.0, apply_sigmoid: true} (beta only for smoothl1)
      patch_loss:
        type: "binarycrossentropy"
        args: null
      aggreg_loss:
        type: "dice"
        args: null
      weights:
        default:
          target_patch: 0.5
          target_aggreg: 0.5
          context_patch: 0.5
          context_aggreg: 0.5
          feature_patch: 1.0
          feature_aggreg: 1.0
          context_feature_patch: 1.0
          context_feature_aggreg: 1.0

  global_local:
    global:
      backbone: "ground_truth"
      down_size_rate: 16
      base_channels: 16
      image_size: 512
      patch_size: 16
      overlap: 0.5
      num_train_patches: 50
      starting_tau: 0.6666
      final_tau: 0.6666
      tau_decay_epochs: 100
      loss:
        objective: "gt_mask"
        weight: 1.0

    local:
      backbone: "patch_transformer"
      loss:
        objective: "gt_mask"
        weight: 1.0

    aggregation:
      learnable: false
      loss:
        objective: "gt_mask"
        weight: 1.0

  segformer3d:
    in_channels: 1
    sr_ratios: [4, 2, 1, 1]
    embed_dims: [32, 64, 160, 256]
    patch_kernel_size: [7, 3, 3, 3]
    patch_stride: [4, 2, 2, 2]
    patch_padding: [3, 1, 1, 1]
    mlp_ratios: [4, 4, 4, 4]
    num_heads: [1, 2, 5, 8]
    depths: [2, 2, 2, 2]
    num_classes: 1
    decoder_dropout: 0.0
    decoder_head_embedding_dim: 256

# Hydra settings
hydra:
  run:
    dir: ${paths.RESULTS_DIR}/runs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${paths.RESULTS_DIR}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
