# Override any parameter via CLI: python scripts/train.py experiment=patch_icl_v1
# Multi-run sweep: python scripts/train.py -m context_size=1,2,3

defaults:
  - _self_
  - method: null
  - experiment: null
  - cluster: nfs


# Logging
logging:
  use_wandb: true
  wandb_project: "patch_icl"
  wandb_project_eval: "patch_icl_eval"
  save_imgs_masks: true
  save_every_n_epochs: 1  # Save train images every N epochs
  save_register_tokens: false  # Save register tokens per case during eval
  save_register_images: false  # Also save img/gt/pred as .npy (slower)
  
# Dataset: "totalseg2d" or "medsegbench"
base_dataset: totalseg
download: false
random_coloring_nb: 0
max_labels: null 
train_label_ids: "train"
val_label_ids: "val"
 

# MedSegBench-specific settings (used when dataset=medsegbench)
medsegbench:
  datasets: null  # List of dataset names to load, null for all
  max_samples_per_dataset: null  # Limit per dataset (for debugging)

# Preprocessing
preprocessing:
  image_size: 128
  spacing: [1.5, 1.5, 1.5]
  crop_to_bbox: false
  bbox_padding: 20
  

max_files_3d_to_2d: null  # Limit number of cases/files to process (for debugging)
class_balanced: true  # Uniform label sampling (each label equally likely per step)
dataloader_type: zopt
same_case_context_ratio: 1.0  # Ratio of context from same case (0.0=all other, 1.0=all same)
# Coverage filtering: slice valid if coverage >= max(min_coverage, max_coverage * min_coverage_ratio)
min_coverage: 30  # Minimum pixels for slice to be valid
min_coverage_ratio: 0  # Minimum ratio of max coverage
 # Slice subsampling (shared dataloader only)                                                                                                                                             
max_slices_per_group: 10   # Max slices per (case, label, axis), null for unlimited
slice_selection: "stride_peak"  # "all", "random", "stride", "stride_peak"

max_ds_len:  # Can be null, int, or dict with train/val keys
  train: null
  val: null
max_cases:                                                                                                                                                                               
    train: null                                                                                                                                                                             
    val: null
context_size: 10


# Optimizer
optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0001
    weight_decay: 0.05

# Schedulers
train_scheduler:
  scheduler_type: "cosine_annealing"
  scheduler_args:
    min_lr: 0.000001

training:
  seed: 42
  num_epochs: 100
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 12
  log_every: 20
  compute_metrics_every: 20
  val_compute_metrics_every: 20
  mixed_precision: bf16 #fp16 #"no" #
  
warmup_scheduler:
  enabled: true
  warmup_epochs: 10

# Iterative evaluation settings
iterative:
  num_initial_context: 3       # Context slices from reference case
  num_propagated_context: 2    # Previous predictions to include as context
  propagation_direction: "forward"  # "forward", "backward", "center_out"
  use_gt_propagation: false    # Ablation: use GT masks instead of predictions

method: null
checkpoint: null  # Path to model checkpoint to load weights from


# Hydra settings
hydra:
  run:
    dir: ${paths.RESULTS_DIR}/runs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${paths.RESULTS_DIR}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
