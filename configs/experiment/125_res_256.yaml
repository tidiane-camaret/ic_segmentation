# @package _global_
# End-to-end gradient flow: Option C
#
# Key changes from 123_2_lvls:
# - detach_between_levels: false → gradients flow L1 → L0
# - target_combined: 1.0 → supervise the combined prediction
# - level_weights: [1.5, 1.0] → protect level 0's own objective
#
# What this enables:
# - Level 0 learns to be uncertain WHERE LEVEL 1 CAN HELP
# - Gumbel-softmax provides differentiable path through sampling
# - Additive fusion is directly supervised
#
# Risks to monitor:
# - Training instability (watch for loss spikes, NaN)
# - Level 0 entropy collapse (all uncertain) or anti-collapse (all confident)
# - Slower convergence per epoch

defaults:
  - /augmentation: custom2
  - override /method: patch_icl

max_ds_len:  # Can be null, int, or dict with train/val keys
  train: 20000

preprocessing:
  image_size: 256 # [128, 256, 512] Random image size per batch 
  feature_image_size: 256

context_size: 6 #[5, 10]        # Random contexts per batch

model:
  patch_icl:
    model_version: "v3"
    feature_extractor:
      output_grid_size: "${preprocessing.feature_image_size}"
      freeze: true

    levels:
      - resolution: 24
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 9
        num_context_patches: 9
        pad_before: 0
        pad_after: 0
      - resolution: 96
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 20
        num_context_patches: 20
        pad_before: 0
        pad_after: 0
        spread_sigma_target: 4.0
        spread_sigma_context: 4.0
      - resolution: "${preprocessing.image_size}"
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 30
        num_context_patches: 30
        pad_before: 0
        pad_after: 0
        spread_sigma_target: 4.0
        spread_sigma_context: 4.0

    # Oracle disabled - pure model-based sampling
    oracle_levels_train: [false, false, false]
    oracle_levels_valid: [false, false, false]

    oracle_scheduling:
      enabled: false
      schedule: "linear"
      start_prob: 0.5
      end_prob: 0.0
      warmup_epochs: 1
      decay_epochs: 5

    sampler:
      # Oracle mode (not used when oracle disabled)
      target_sampling_oracle: "gt_previous_pred_error"
      # Model mode: sample from high-entropy (uncertain) regions
      target_model_sampling: "predicted_entropy"
      # Context: balanced foreground + entropy
      context_sampling: "gt_foreground_entropy_balanced"
      # CRITICAL: differentiable for gradient flow through selection_probs
      differentiable: true

    aggregator:
      type: "average"
      min_coverage: 1e-6
      use_sampling_map: false

    backbone:
      compile: false
      decoder_use_skip_connections: false
      image_size: "${preprocessing.image_size}"
      embed_dim: 256
      embed_proj_dim: 256
      feature_grid_size: "${model.patch_icl.feature_extractor.output_grid_size}"
      patch_feature_grid_size: 8
      num_heads: 4
      num_layers: 2
      num_context_layers: 1
      num_registers: 1
      target_self_attention: true
      dropout: 0.1
      append_zero_attn: true
      use_mask_prior: false
      use_context_mask: true
      mask_fusion_type: "concat"
      # Enable gradient checkpointing if memory is tight
      gradient_checkpointing: false

    # Entropy-based sampling map (no learned head)
    sampling_map:
      source: "entropy"
      temperature: 1.0
      learn_temperature: true

    loss:
      patch_loss:
        type: "softdiceFocal"
        args: null
      aggreg_loss:
        type: "softdiceFocal"
        args: null
      weights:
        default:
          target_patch: 0.0
          target_aggreg: 0.0      # Per-level prediction loss
          context_patch: 0.0
          context_aggreg: 0.0
          target_combined: 1.0    # NEW: Combined (cascaded) prediction loss
      level_weights: [0.0, 0.0, 1.0]

    # OPTION C: End-to-end gradient flow
    cascade:
      detach_between_levels: false  # KEY CHANGE: Allow gradients L1 → L0
      additive_fusion: true         # combined = prev + coverage * current
      sampling_map_blend: false
      learned_alpha: false
      cascade_registers: true       # Register tokens also flow gradients
