# @package _global_
dataset: totalseg2d
max_labels: 60 # null  # If set, use only the top n labels by volume (e.g., 20 for largest 20)

# trainable image encoder
feature_mode: "on_the_fly"
feature_extractor_type: "icl_encoder"

preprocessing:
  image_size: [128, 128, 128]

context_size: 3  # Increased from 1

# CarveMix augmentation (training only, single-label mode)
carve_mix:
  enabled: true
  probability: 0.5
  margin_range: [0.1, 0.5]
  harmonize: true
  harmonize_sigma: 5.0

# Image-level augmentation (applied in dataloader, training only)
image_augmentation:
  enabled: true
  rotation_limit: 15.0        # Max rotation angle in degrees
  scale_limit: 0.1            # Max scale factor deviation (0.9-1.1x)
  elastic_alpha: 50.0         # Elastic deformation intensity
  elastic_sigma: 5.0          # Elastic deformation smoothness
  brightness_limit: 0.1       # Max brightness shift
  contrast_limit: 0.1         # Max contrast change
  gamma_limit: [80, 120]      # Gamma correction range
  noise_std_range: [0.02, 0.05]  # Gaussian noise std dev range

# Advanced augmentation for ICL generalization (training only)
advanced_augmentation:
  enabled: true
  windowing_jitter: 100          # Max HU shift for CT window bounds (+-100 HU)
  foreground_crop:
    probability: 0.3             # Chance of random FG-anchored crop
    min_crop_frac: 0.5           # Smallest crop = 50% of image (FG always included)
  mask_perturbation:
    probability: 0.3             # Chance of dilate/erode on each context mask
    max_kernel: 5                # Max morphological kernel size
  resolution_degradation:
    probability: 0.2             # Chance of downsample-then-upsample per image
    min_scale: 0.25              # Worst-case 4x downscale
  asymmetric_intensity:
    probability: 0.5             # Chance of independent intensity shift per image
    brightness_shift: 0.15       # Max brightness offset
    contrast_scale: 0.15         # Max contrast multiplier deviation
    gamma_range: [0.7, 1.5]     # Gamma exponent range

training:
  seed: 42
  num_epochs: 10
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 12
  log_every: 10


warmup_scheduler:
  enabled: true
  warmup_epochs: 2

model:
  patch_icl:
    feature_extractor:
      type: "icl_encoder"
      layer_idx: "all"  # "all", single int (0-3), or list [1,2,3]. "all" -> D=256 (64*4 layers)
      freeze: false
      output_grid_size: 32 #128  # Full resolution (layer 0 native size)

    levels:
      - resolution: 16
        patch_size: 8
        num_patches: 8
        num_patches_val: 16
        sampling_temperature: 0.2
      - resolution: 32
        patch_size: 8
        num_patches: 12
        num_patches_val: 32
        sampling_temperature: 0.2
      - resolution: 64
        patch_size: 8
        num_patches: 16
        num_patches_val: 64
        sampling_temperature: 0.2

    oracle_levels_train: [false, false, false]  # Level 0: uniform, Level 1: guided by level 0 predictions
    oracle_levels_valid: [false, false, false]  # Level 0: uniform, Level 1: guided by level 0 predictions

    cascade:
      detach_between_levels: true  # Detach predictions between levels (memory efficient)

    sampler:
      type: "continuous"

    aggregator:
      type: "average"
      combine_mode: "average"
      min_coverage: 1e-6

    backbone:
      decoder_use_skip_connections: false
      image_size: 128
      embed_dim: 256  # Must match feature_extractor output dim (64 * num_layers)
      embed_proj_dim: 256
      feature_grid_size: 128  # Must match feature_extractor output_grid_size
      patch_feature_grid_size: 8  # Backbone encoder input spatial size
      num_heads: 8
      num_layers: 3
      num_registers: 4
      target_self_attention: true
      dropout: 0.1
      append_zero_attn: true

    loss:
      patch_loss:
        type: "softdiceBCE"
        args: null
      aggreg_loss:
        type: "softdiceBCE"
        args: null
      weights:
        default:
          target_patch: 1.0
          target_aggreg: 1.0
          context_patch: 0.5
          context_aggreg: 0.5
      level_weights: [1.0, 1.0, 1.0]  # Per-level loss multiplier
