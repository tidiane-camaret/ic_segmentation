# @package _global_
# Inherits from method/patch_icl.yaml for model config.
# Entropy-based confidence: conf = 1 - H(p)/log(2)

defaults:
  - /augmentation
  - override /method: patch_icl

model:
  patch_icl:
    levels:
      - resolution: 18
        patch_size: 8
        sampling_method: "sliding_window"
        stride: 6
        num_patches: 9
        pad_before: 1
        pad_after: 1
      - resolution: 36
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 6
        num_patches: 8
        pad_before: 1
        pad_after: 1

    oracle_levels_train: [false, false]
    oracle_levels_valid: [false, false]

    aggregator:
      type: "average"
      # Note: combine_mode not used - level blending handled by cascade.confidence_blend
      min_coverage: 1e-6
      use_confidence: true
      confidence_mode: "multiply"

    backbone:
      compile: false
      decoder_use_skip_connections: false
      image_size: 256
      embed_dim: 256
      embed_proj_dim: 256
      feature_grid_size: 64
      patch_feature_grid_size: 8
      num_heads: 4
      num_layers: 2
      num_context_layers: 1
      num_registers: 4
      target_self_attention: true
      dropout: 0.1
      append_zero_attn: true
      use_mask_prior: true
      use_context_mask: true
      mask_fusion_type: "concat"
      predict_confidence: false

    loss:
      patch_loss:
        type: "softdice"
        args: null
      aggreg_loss:
        type: "softdice"
        args: null
      weights:
        default:
          target_patch: 1.0
          target_aggreg: 1.0
          context_patch: 0.5
          context_aggreg: 0.5
      level_weights: [1.0, 1.0]
      confidence:
        method: "entropy"
        enabled: true
        temperature: 1.0
        learn_temperature: true
        supervision_weight: 0
        boundary_weight: 0
        boundary_width: 2
        weighted_seg: false

    cascade:
      detach_between_levels: true
      confidence_blend: true
