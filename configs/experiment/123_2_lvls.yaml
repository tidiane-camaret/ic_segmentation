# @package _global_
# Entropy-based sampling: no learned sampling head, use prediction entropy directly
#
# Key insight: entropy H(p) = -p*log(p) - (1-p)*log(1-p) is FREE at inference
# - High entropy (near 0.5) = uncertain = sample more
# - Low entropy (near 0 or 1) = confident = sample less
#
# This removes the sampling head entirely, avoiding:
# - Extra parameters to train
# - Risk of collapse / conflicting objectives
# - Train/inference gap from learned map

defaults:
  - /augmentation: custom
  - override /method: patch_icl

preprocessing:
  image_size: 128
  feature_image_size: 128

context_size: 3

model:
  patch_icl:
    model_version: "v3"  # Use refactored v3 implementation
    feature_extractor:
      output_grid_size: "${preprocessing.feature_image_size}"
      freeze: true
    levels:
      - resolution: 24
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 9
        num_context_patches: 9
        pad_before: 0
        pad_after: 0
      - resolution: "${preprocessing.image_size}"
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 50
        num_context_patches: 30
        pad_before: 0
        pad_after: 0
        spread_sigma_target: 4.0
        spread_sigma_context: 4.0

    oracle_levels_train: [false, false]
    oracle_levels_valid: [false, false]

    oracle_scheduling:
      enabled: false
      schedule: "linear"
      start_prob: 0.5
      end_prob: 0.0
      warmup_epochs: 1
      decay_epochs: 5

    sampler:
      # Oracle: sample where previous prediction had errors (GT available)
      target_sampling_oracle: "gt_previous_pred_error"
      # Model: sample where prediction entropy is high (uncertain regions)
      target_model_sampling: "predicted_entropy"
      # Context: balanced foreground + entropy from GT masks
      context_sampling: "gt_foreground_entropy_balanced"
      # Differentiable selection for gradient flow through patch weighting
      differentiable: true

    aggregator:
      type: "average"
      min_coverage: 1e-6
      # No sampling_map weighting needed - selection is enough
      use_sampling_map: false

    backbone:
      compile: false
      decoder_use_skip_connections: false
      image_size: "${preprocessing.image_size}"
      embed_dim: 256
      embed_proj_dim: 256
      feature_grid_size: "${model.patch_icl.feature_extractor.output_grid_size}"
      patch_feature_grid_size: 8
      num_heads: 4
      num_layers: 2
      num_context_layers: 1
      num_registers: 1
      target_self_attention: true
      dropout: 0.1
      append_zero_attn: true
      use_mask_prior: false
      use_context_mask: true
      mask_fusion_type: "concat"

    # NO learned sampling map - use entropy directly from predictions
    sampling_map:
      source: "entropy"  # Computed from logits, no learning
      temperature: 1.0   # Can be tuned or learned
      learn_temperature: true

    loss:
      patch_loss:
        type: "softdiceFocal"
        args: null
      aggreg_loss:
        type: "softdiceFocal"
        args: null
      weights:
        default:
          target_patch: 0.0
          target_aggreg: 1.0
          context_patch: 0.0
          context_aggreg: 0.0
          target_combined: 0.0
      level_weights: [1.0, 1.0]

    cascade:
      detach_between_levels: true
      additive_fusion: true
      sampling_map_blend: false
      learned_alpha: false
      cascade_registers: true
