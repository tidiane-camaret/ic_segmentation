# @package _global_
# Experiment: Mixed training (50% TotalSeg + 50% SynthMorph), val on TotalSeg
# Based on 130_2_lvls.yaml with synthetic data generation

defaults:
  - /augmentation: custom2
  - override /method: patch_icl

# Use TotalSeg as base (for validation), mix with synthetic for training
base_dataset: medsegbench

# TotalSeg label configuration
train_label_ids: "train"
val_label_ids: "val"

# Synthetic data configuration (used for mixed training)
synthmorph:
  num_tasks: 1000              # Number of unique anatomies
  num_labels: 16               # Regions per task
  epoch_length: 10000          # Samples per epoch
  master_seed: 42
  max_cache_size: 500          # LRU cache for base label maps
  # Generation parameters
  sigma_range: [5.0, 15.0]     # Smoothing for region size
  sigma_def: 2.0               # Deformation magnitude
  sigma_smooth: 8.0            # Deformation smoothness

# Mixed training: 50% TotalSeg + 50% SynthMorph
mixed_training:
  enabled: true
  synth_ratio: 0.5             # 50% synthetic, 50% real

max_ds_len:
  train: 10000
max_cases:
  val: null

preprocessing:
  image_size: 64
  feature_image_size: "${preprocessing.image_size}"

context_size:
  train: 3
  val: 3

model:
  patch_icl:
    model_version: "v3"
    feature_extractor:
      type: "universeg"
      output_grid_size: "${preprocessing.image_size}"
      freeze: false

    levels:
      - resolution: "${preprocessing.image_size}"
        patch_size: 8
        sampling_method: "continuous"
        sampling_temperature: 0.1
        stride: 8
        num_patches: 64
        num_context_patches: 16
        pad_before: 0
        pad_after: 0

    # Oracle disabled - pure model-based sampling
    oracle_levels_train: [false, false]
    oracle_levels_valid: [false, false]

    oracle_scheduling:
      enabled: true
      schedule: "linear"
      start_prob: 0.5
      end_prob: 0.0
      warmup_epochs: 1
      decay_epochs: 5

    sampler:
      target_sampling_oracle: "gt_foreground_entropy_balanced"
      target_model_sampling: "predicted_entropy"
      context_sampling: "gt_foreground_entropy_balanced"
      differentiable: true

    aggregator:
      type: "average"
      min_coverage: 1e-6
      use_sampling_map: false

    backbone:
      compile: false
      decoder_use_skip_connections: false
      image_size: "${preprocessing.image_size}"
      embed_dim: 256
      embed_proj_dim: 256
      feature_grid_size: "${model.patch_icl.feature_extractor.output_grid_size}"
      patch_feature_grid_size: 8
      num_heads: 4
      num_layers: 6
      num_context_layers: 6
      num_registers: 1
      target_self_attention: true
      dropout: 0.1
      append_zero_attn: true
      use_mask_prior: false
      use_context_mask: true
      mask_fusion_type: "concat"
      gradient_checkpointing: false

    sampling_map:
      source: "entropy"
      temperature: 1.0
      learn_temperature: true

    loss:
      patch_loss:
        type: "softdiceFocal"
        args: null
      aggreg_loss:
        type: "softdiceFocal"
        args: null
      weights:
        target_patch: 0.0
        target_aggreg: 1.0
        context_patch: 0.0
        context_aggreg: 0.0
        target_combined: 0.0
      level_weights: [1.0]

    cascade:
      detach_between_levels: false
      additive_fusion: true
      sampling_map_blend: false
      learned_alpha: false
      cascade_registers: true
      skip_context_decoding: true
