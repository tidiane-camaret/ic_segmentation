# @package _global_
# EXP_11_IMPROVED: Fixes for train/val dice gap
# Changes from exp_10:
# - Increased num_epochs: 10 -> 100
# - Increased context_size: 1 -> 3
# - Enabled context loss (0.5 weight)
# - Enabled patch augmentation (rotation, flips)
# - Enabled decoder skip connections
# - Using continuous sampler with oracle training

dataset: "totalseg2d"
train_label_ids: train
val_label_ids: val
max_ds_len:  # Can be null, int, or dict with train/val keys
  train: 100000
  val: 5000

context_size: 1  # Increased from 1
random_coloring_nb: 0

# Use on-the-fly MedSAM v1 features
feature_mode: "on_the_fly"
load_dinov3_features: false

preprocessing:
  image_size: [256, 256, 256]

training:
  seed: 42
  num_epochs: 10  # Increased from 10
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 12
  log_every: 10

optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0003
    weight_decay: 0.01

warmup_scheduler:
  enabled: true
  warmup_epochs: 3  # Reasonable warmup for 10 epochs

model:
  patch_icl:
    feature_extractor:
      type: "medsam_v1"
      checkpoint_path: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/medsam_vit_b.pth"
      layer_idx: 11
      freeze: true
      target_size: 512
      output_grid_size: 32

    levels:
      - resolution: 32
        patch_size: 8
        num_patches: 16  # Used by continuous sampler
        sampling_temperature: 0.1

    oracle_levels_train: [false]  # GT-guided sampling during training
    oracle_levels_valid: [false]  # Uniform sampling during validation

    sampler:
      type: "sliding_window"  # Changed from sliding_window - uses oracle weights
      sliding_window_stride: 8  # Ignored for continuous
      augmentation:
        enabled: false  # Enable patch augmentation
        rotation: "90"  # Discrete 90-degree rotations
        flip_horizontal: true
        flip_vertical: true

    aggregator:
      type: "average"
      combine_mode: "average"
      min_coverage: 1e-6

    backbone:
      decoder_use_skip_connections: true  # Enabled skip connections
      image_size: 256
      embed_dim: 768
      embed_proj_dim: 256
      feature_grid_size: 32
      patch_feature_grid_size: 16
      num_heads: 8
      num_layers: 4
      num_registers: 8
      target_self_attention: true
      dropout: 0.1

    loss:
      patch_loss:
        type: "softdiceBCE"
        args: null
      aggreg_loss:
        type: "softdiceBCE"
        args: null
      weights:
        default:
          target_patch: 1.0
          target_aggreg: 1.0
          context_patch: 0  # Enabled context loss
          context_aggreg: 0  # Enabled context loss

logging:
  use_wandb: true
  wandb_project: "patch_icl"
  save_imgs_masks: true
