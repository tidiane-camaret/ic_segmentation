# @package _global_



train_batch_size: 64 
val_batch_size: 64
max_ds_len: 10000 


train_label_ids: ["liver"]
val_label_ids: ["liver"]
context_size: 1

method: "patch_icl"

model:
  patch_icl:
    sampler:
      type: "sliding_window"
    backbone:
      type: "crosspatch_attention"
      embed_dim: 1024
      patch_size: 16
      image_size: 224

    loss:
      patch_loss:
        type: "binarycrossentropy"
        args: null
      aggreg_loss:
        type: "dice"
        args: null
      weights:
        default:
          target_patch: 1
          target_aggreg: 1
          context_patch: 1
          context_aggreg: 1
          feature_patch: 0
          feature_aggreg: 0
          context_feature_patch: 0
          context_feature_aggreg: 0



logging:
  use_wandb: true
  wandb_project: "patch_icl_train"
  save_imgs_masks: true