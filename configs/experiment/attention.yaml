# @package _global_
# Experiment with larger context size

context_size: 5
method: "patch_icl"


train_batch_size: 32  # Reduce batch size due to more context
val_batch_size: 32
max_ds_len: 10 # Keep dataset length manageable
logging:
  use_wandb: true
  wandb_project: "patch_icl_train"
  save_imgs_masks: false
model:
  patch_icl:
    sampler:
      type: "sliding_window"
    backbone:
      type: "crosspatch_attention"
      embed_dim: 1024
      patch_size: 16
      image_size: 224