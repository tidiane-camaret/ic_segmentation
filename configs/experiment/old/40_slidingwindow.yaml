# @package _global_
dataset: medsegbench

medsegbench:
  datasets: null  # Shared fallback (used when train/val_datasets not set), null for all
  train_datasets:  # 24 datasets, ~39K train-split images
    - fhpsaop            # Ultrasound - fetal head (3-class)
    - ultrasoundnerve    # Ultrasound - brachial plexus nerves
    - usforkidney        # Ultrasound - kidney
    - chasedb1           # Fundus - retinal vessels
    - chuac              # Fundus - retinal vessels
    - dca1               # Fundus - optic discs
    - covid19radio       # Chest X-Ray - lung
    - pandental          # X-Ray - mandible
    - isic2018           # Dermoscopy - skin lesions
    - uwaterlooskincancer # Dermoscopy - skin cancer
    - polypgen           # Endoscopy - colon polyps
    - m2caiseg           # Endoscopy - surgical tools (19-class)
    - robotool           # Endoscopy - surgical tools
    - bbbc010            # Microscopy - C. elegans
    - brifiseg           # Microscopy - fibers (3-class)
    - deepbacs           # Microscopy - bacteria
    - yeaz               # Microscopy - yeast cells
    - dynamicnuclear     # Nuclear - nuclear cells
    - nuset              # Nuclear - nuclear cells
    - mosmedplus         # CT - lung
    - promise12          # MRI - prostate
    - cystoidfluid       # OCT - macular edema
    - monusac            # Pathology - multi-organ (5-class)
    - tnbcnuclei         # Pathology - histopathology nuclei

  val_datasets:  # 8 datasets, ~4.5K val-split images
    - busi               # Ultrasound - breast lesions
    - covidquex          # Chest X-Ray - lung
    - isic2016           # Dermoscopy - skin lesions
    - kvasir             # Endoscopy - GI polyps
    - cellnuclei         # Microscopy - cell nuclei
    - wbc                # Microscopy - WBC (3-class)
    - drive              # Fundus - retinal vessels
    - nuclei             # Pathology - cell nuclei
    
  max_samples_per_dataset: null  # Limit per dataset (for debugging)


paths:
  ckpts:
    patch_icl_v2: ${..RESULTS_DIR}/checkpoints/radiant-salad-168/best_model.pt

logging:
  use_wandb: true
  wandb_project: "patch_icl"
  save_imgs_masks: true
  save_every_n_epochs: 1  # Save train images every N epochs

context_size: 3  # Increased from 1
random_coloring_nb: 0

# Use on-the-fly MedSAM v1 features
feature_mode: "on_the_fly"
feature_extractor_type: "universeg"

preprocessing:
  image_size: [256, 256, 256]

# CarveMix augmentation (training only, single-label mode)
carve_mix:
  enabled: true
  probability: 0.5
  margin_range: [0.1, 0.5]
  harmonize: true
  harmonize_sigma: 5.0

# Image-level augmentation (applied in dataloader, training only)
image_augmentation:
  enabled: true
  rotation_limit: 15.0        # Max rotation angle in degrees
  scale_limit: 0.1            # Max scale factor deviation (0.9-1.1x)
  elastic_alpha: 50.0         # Elastic deformation intensity
  elastic_sigma: 5.0          # Elastic deformation smoothness
  brightness_limit: 0.1       # Max brightness shift
  contrast_limit: 0.1         # Max contrast change
  gamma_limit: [80, 120]      # Gamma correction range
  noise_std_range: [0.02, 0.05]  # Gaussian noise std dev range

# Advanced augmentation for ICL generalization (training only)
advanced_augmentation:
  enabled: true
  windowing_jitter: 100          # Max HU shift for CT window bounds (±100 HU)
  foreground_crop:
    probability: 0.3             # Chance of random FG-anchored crop
    min_crop_frac: 0.5           # Smallest crop = 50% of image (FG always included)
  mask_perturbation:
    probability: 0.3             # Chance of dilate/erode on each context mask
    max_kernel: 5                # Max morphological kernel size
  resolution_degradation:
    probability: 0.2             # Chance of downsample-then-upsample per image
    min_scale: 0.25              # Worst-case 4x downscale
  asymmetric_intensity:
    probability: 0.5             # Chance of independent intensity shift per image
    brightness_shift: 0.15       # Max brightness offset
    contrast_scale: 0.15         # Max contrast multiplier deviation
    gamma_range: [0.7, 1.5]     # Gamma exponent range

training:
  seed: 42
  num_epochs: 100  # Increased from 10
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 12
  log_every: 10

optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0003
    weight_decay: 0.01

warmup_scheduler:
  enabled: true
  warmup_epochs: 10  # Reasonable warmup for 100 epochs

model:
  patch_icl:
    feature_extractor:
      type: "universeg"
      checkpoint_path: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/medsam_vit_b.pth"
      layer_idx: "all"  # "all", single int (0-3), or list [1,2,3]. "all" → D=256 (64*4 layers)
      freeze: true
      target_size: 128
      output_grid_size: 32

    levels:
      - resolution: 32
        patch_size: 8
        num_patches: 16  # Used by continuous sampler
        sampling_temperature: 0.1

    oracle_levels_train: [false]  # GT-guided sampling during training
    oracle_levels_valid: [false]  # Uniform sampling during validation

    sampler:
      type: "sliding_window"  # Changed from sliding_window - uses oracle weights
      sliding_window_stride: 8  # Ignored for continuous
      augmentation:
        enabled: false  # Enable patch augmentation
        rotation: "90"  # Discrete 90-degree rotations
        flip_horizontal: true
        flip_vertical: true

    aggregator:
      type: "average"
      combine_mode: "average"
      min_coverage: 1e-6

    backbone:
      decoder_use_skip_connections: false
      image_size: 256
      embed_dim: 256  # Must match feature_extractor output dim (64 * num_layers)
      embed_proj_dim: 64
      feature_grid_size: 32
      patch_feature_grid_size: 8  # Must match patch_size
      num_heads: 8
      num_layers: 4
      num_registers: 8
      target_self_attention: true
      dropout: 0.1

    loss:
      patch_loss:
        type: "softdiceBCE"
        args: null
      aggreg_loss:
        type: "softdiceBCE"
        args: null
      weights:
        default:
          target_patch: 1.0
          target_aggreg: 1.0
          context_patch: 0  # Enabled context loss
          context_aggreg: 0  # Enabled context loss


