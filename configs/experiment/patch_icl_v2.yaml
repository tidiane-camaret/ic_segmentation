# @package _global_
# MedSAM-based patch_icl config
# Supports MedSAM v1 layer features (768-dim) or MedSAM2 features (256-dim)

dataset: "totalseg2d"
train_label_ids: ['colon', 'costal_cartilages', 'duodenum', 'iliopsoas_right', 'inferior_vena_cava', 'kidney_left', 'kidney_right', 'lung_middle_lobe_right', 'pancreas', 'scapula_left', 'small_bowel', 'spleen', 'sternum', 'stomach', 'trachea', 'vertebrae_T10', 'vertebrae_T11', 'vertebrae_T12', 'vertebrae_T3', 'vertebrae_T4', 'vertebrae_T5', 'vertebrae_T9']
val_label_ids: ['aorta', 'autochthon_left', 'autochthon_right', 'esophagus', 'heart', 'iliopsoas_left', 'liver', 'lung_lower_lobe_left', 'lung_lower_lobe_right', 'lung_upper_lobe_left', 'lung_upper_lobe_right', 'scapula_right', 'spinal_cord', 'vertebrae_L1', 'vertebrae_T7', 'vertebrae_T8']
max_ds_len: null
context_size: 1
random_coloring_nb: 0  # Binary segmentation (clearer gradients)
method: "patch_icl"

# Feature extraction mode
feature_mode: "on_the_fly"

preprocessing:
  image_size: [256, 256, 256]

training:
  seed: 42
  num_epochs: 200
  print_every: 50
  grad_accumulate_steps: 1
  num_workers: 8
  log_every: 10

optimizer:
  optimizer_type: "adamw"
  optimizer_args:
    lr: 0.0003  # Scaled for larger batch
    weight_decay: 0.01

warmup_scheduler:
  enabled: true
  warmup_epochs: 10

model:
  patch_icl:
    # Feature extractor configuration (used for on-the-fly extraction)
    # Options: "meddino", "medsam_v1" (layer 11 features, 768-dim)
    # 
    # MedSAM v1 grid size = target_size / 16:
    #   - target_size=1024 → 64×64 grid (slow)
    #   - target_size=512  → 32×32 grid (recommended)
    #   - target_size=256  → 16×16 grid (fast)
    #
    # For best quality, use target_size = output_grid_size * 16 (native extraction)
    feature_extractor:
      type: "medsam_v1"
      checkpoint_path: "/nfs/data/nii/data1/Analysis/camaret___in_context_segmentation/ANALYSIS_20251122/checkpoints/medsam_vit_b.pth"
      layer_idx: 11           # Transformer block (0-11), 11 = last block
      freeze: true
      target_size: 512        # Input resolution: 512 → native 32×32 grid (no pooling!)
      output_grid_size: 32    # Output grid size (32×32 = 1024 tokens)
                              # At level_res=32, patch_size=16: tokens_per_patch = 16×16 = 256

    levels:
      - resolution: 32
        patch_size: 16
        num_patches: 4
        sampling_temperature: 0.001

    oracle_levels_train: [false]
    oracle_levels_valid: [false]

    # Iterative refinement (uncertainty-based re-sampling)
    refinement:
      passes: 1  # 1 = no refinement (default), 2+ = iterative
      uncertainty_type: "confidence"  # "confidence", "entropy", "margin"
      sampler:
        type: "continuous"
        num_patches: 1
        temperature: 0.001

    sampler:
      type: "sliding_window"
      sliding_window_stride: 16
      augmentation:
        enabled: false
        rotation: "continuous"
        flip_horizontal: false
        flip_vertical: false

    aggregator:
      type: "average"  # Use simple averaging for non-overlapping sliding window
      combine_mode: "average"
      min_coverage: 1e-6

    backbone:
      image_size: 256
      embed_dim: 768            # MedSAM v1 layer features dimension (768-dim)
      embed_proj_dim: 256       # Working dimension (projection from 768)
      feature_grid_size: 32     # Full image feature grid (must match feature_extractor.output_grid_size)
      patch_feature_grid_size: 16  # Spatial size of features PER PATCH (16x16 = 256 tokens)
                                   # = patch_size * (feature_grid_size / level_resolution)
                                   # = 16 * (32 / 32) = 16
      num_heads: 8              # Must divide embed_proj_dim (256 / 8 = 32)
      num_layers: 4             # Deeper reasoning
      num_registers: 8
      target_self_attention: true
      dropout: 0.1

    loss:
      patch_loss:
        type: "diceCE"
        args: null
      aggreg_loss:
        type: "diceCE"
        args: null
      weights:
        default:
          target_patch: 1.0
          target_aggreg: 1.0
          context_patch: 0.0  # Enable context supervision
          context_aggreg: 0.0

logging:
  use_wandb: true
  wandb_project: "patch_icl"
  save_imgs_masks: true
