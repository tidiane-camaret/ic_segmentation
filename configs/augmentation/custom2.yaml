# @package _global_
# Spatial independence WITHOUT destroying symmetric organ tasks
# Key insight: flips must stay at task-level, only translation/scale/crop at example-level
#
# Philosophy:
# - Task-level: Flips (safe - all images flip together), shared intensity
# - Example-level: Position/scale/elastic independence (safe for symmetric organs)
# - Medical specialty: Aggressive independent cropping

augmentation:
  enabled: true
  type: "universeg"
  img_size: 256

  medical_specialty:
    enabled: true
    crop_p: 0.8
    min_crop_frac: 0.3
    max_crop_frac: 0.8
    carvemix_p: 0.0
    harmonize: true
    harmonize_sigma: 5.0

  # Task-level: Flips here (safe - all images flip together)
  task:
    flip_intensities_p: 0.5
    flip_labels_p: 0.0
    sobel_edge_p: 0.0

    # Flips at task-level ONLY - preserves left/right semantics
    flip_horizontal_p: 0.5
    flip_vertical_p: 0.5

    # Shared spatial disabled - we want independence via example-level
    affine_p: 0.0
    elastic_p: 0.0

    # Shared intensity
    brightness_contrast_p: 0.5
    brightness_range: [-0.15, 0.15]
    contrast_range: [0.7, 1.3]
    blur_p: 0.4
    blur_kernel: 5
    blur_sigma: [0.1, 1.2]
    noise_p: 0.4
    noise_mean: [0, 0.04]
    noise_var: [0, 0.04]
    sharpness_p: 0.3
    sharpness_factor: 4.0

  # Example-level: Position/scale independence, NO flips
  example:
    enabled: true
    apply_to_target: true

    # Translation and scale - safe for symmetric organs
    affine_p: 0.8
    rotation_range: [-45, 45]    # Limited rotation (not 180 which = flip)
    scale_range: [0.7, 1.3]
    translate_max: 0.3           # Large translation - object can be anywhere

    # Elastic deformation - safe, just shape variation
    elastic_p: 0.7
    elastic_alpha: [1.5, 3.0]
    elastic_sigma: [5, 8]

    # NO flips at example level - would break symmetric organs

    # Mild intensity (already diverse from task-level)
    brightness_contrast_p: 0.2
    brightness_range: [-0.05, 0.05]
    contrast_range: [0.9, 1.1]
    blur_p: 0.15
    blur_kernel: 3
    blur_sigma: [0.1, 0.5]
    noise_p: 0.15
    noise_mean: [0, 0.02]
    noise_var: [0, 0.02]
    sharpness_p: 0.15
    sharpness_factor: 2.0
